# =============================================================================
#  CONFIGURACIÓN APACHE - AMBIENTES MULTI-PLATAFORMA
#  geosuite-dev.centrogeo.org.mx
#
#  Agregar estos bloques al servidor Apache de CentroGeo.
#  El VirtualHost existente de geosuite-dev.centrogeo.org.mx NO se modifica.
#
#  Puertos por plataforma:
#    idegeo  → nginx: 8001 | admin: 3001 | app: 3002
#    conafor → nginx: 8002 | admin: 3011 | app: 3012
#    sedema  → nginx: 8003 | admin: 3021 | app: 3022
# =============================================================================


# =============================================================================
#  IDEGEO
# =============================================================================
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName idegeo.geosuite-dev.centrogeo.org.mx
    ServerAdmin hostmaster@geoint.mx

    # --- Parámetros generales ---
    LimitRequestBody 0
    ProxyTimeout 600
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyVia Off
    AllowEncodedSlashes NoDecode

    # --- Autorización (Bearer headers) ---
    RequestHeader set Authorization "%{HTTP:Authorization}s" env=HTTP_AUTHORIZATION

    # ===============================
    #  FRONTEND ADMIN (/admin)
    # ===============================
    ProxyPass        "/admin/"  "http://10.2.102.228:3001/admin/"
    ProxyPassReverse "/admin/"  "http://10.2.102.228:3001/admin/"

    # ===============================
    #  FRONTEND PÚBLICO (/app)
    # ===============================
    ProxyPass        "/app/"  "http://10.2.102.228:3002/app/"
    ProxyPassReverse "/app/"  "http://10.2.102.228:3002/app/"

    # ===============================
    #  Default redirect
    # ===============================
    RedirectMatch ^/$ /app/

    # --- Proxy reverso hacia el NGINX interno ---
    ProxyPass "/" "http://10.2.102.228:8001/"
    ProxyPassReverse "/" "http://10.2.102.228:8001/"

    # Cabeceras estándar hacia NGINX
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Scheme "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"
    RequestHeader set X-Forwarded-Ssl on

    # Seguridad adicional
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"

    LogLevel proxy_http:info
    ErrorLog ${APACHE_LOG_DIR}/idegeo.https.error.log
    CustomLog ${APACHE_LOG_DIR}/idegeo.https.access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/idegeo.geosuite-dev.centrogeo.org.mx/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/idegeo.geosuite-dev.centrogeo.org.mx/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>


