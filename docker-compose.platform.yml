services:
  nginx:
    networks:
      sigicnetwork:
      sigic-proxy:

  frontend-admin:
    image: sigic-frontend-admin:${COMPOSE_PROJECT_NAME}
    build:
      context: ./frontend
      dockerfile: ../overrides/frontend/Dockerfile
      args:
        NUXT_PUBLIC_APP_BASE_PATH: /admin/
    environment:
      NUXT_PUBLIC_AUTH_BASE_URL: "${SITEURL}admin/api/auth"
      NUXT_AUTH_ORIGIN: "http://localhost:3000"
      NUXT_PUBLIC_AUTH_DISABLE_INTERNAL_ROUTING: "true"

  frontend-app:
    image: sigic-frontend-app:${COMPOSE_PROJECT_NAME}
    build:
      context: ./frontend
      dockerfile: ../overrides/frontend/Dockerfile
      args:
        NUXT_PUBLIC_APP_BASE_PATH: /app/
    environment:
      NUXT_PUBLIC_AUTH_BASE_URL: "${SITEURL}app/api/auth"
      NUXT_AUTH_ORIGIN: "http://localhost:3000"
      NUXT_PUBLIC_AUTH_DISABLE_INTERNAL_ROUTING: "true"

  django:
    extra_hosts:
      - "${PLATFORM_HOST}:host-gateway"

  celery:
    extra_hosts:
      - "${PLATFORM_HOST}:host-gateway"

  geoserver:
    extra_hosts:
      - "${PLATFORM_HOST}:host-gateway"

  keycloak:
    extra_hosts:
      - "${PLATFORM_HOST}:host-gateway"

  ia-engine:
    extra_hosts:
      - "${PLATFORM_HOST}:host-gateway"

  ia-queue:
    extra_hosts:
      - "${PLATFORM_HOST}:host-gateway"

  ia-lb:
    extra_hosts:
      - "${PLATFORM_HOST}:host-gateway"

  levantamiento:
    extra_hosts:
      - "${PLATFORM_HOST}:host-gateway"

networks:
  sigic-proxy:
    external: true
