# =============================================================================
#  00-default.conf — Servidor NGINX por defecto
#
#  Este archivo se carga PRIMERO por el prefijo "00-" (orden alfabético).
#  Maneja dos casos:
#    1. Peticiones de verificación ACME de Let's Encrypt (/.well-known/acme-challenge/)
#    2. Cualquier otra petición sin dominio configurado → se bloquea con 444
#
#  IMPORTANTE: No modificar este archivo. Es la base que garantiza que
#  el ACME challenge funcione para cualquier plataforma, incluso antes
#  de que su archivo de configuración específico exista.
# =============================================================================

server {
    # Escucha en puerto 80 (HTTP) en todas las interfaces de red
    # "default_server" significa: si ningún otro bloque server coincide
    # con el dominio de la petición, este bloque la maneja
    listen 80 default_server;
    listen [::]:80 default_server;  # mismo comportamiento para IPv6

    # El guión bajo "_" es una convención de NGINX que significa
    # "cualquier dominio que no coincida con ningún otro server_name"
    server_name _;

    # =========================================================================
    #  ACME Challenge — Validación de certificados SSL con Let's Encrypt
    # =========================================================================
    # Cuando se solicita un certificado SSL, Let's Encrypt verifica que
    # controlamos el dominio haciendo una petición HTTP a esta ruta.
    #
    # Flujo:
    #   1. certbot recibe un token de Let's Encrypt
    #   2. certbot escribe el token en el volumen compartido /var/www/acme-challenge/
    #   3. Let's Encrypt hace GET /.well-known/acme-challenge/TOKEN por puerto 80
    #   4. Este bloque sirve el archivo desde el volumen compartido
    #   5. Let's Encrypt verifica → emite el certificado
    #
    # El modificador "^~" garantiza que esta regla tenga prioridad sobre
    # cualquier otra que también pudiera coincidir con esta ruta
    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/acme-challenge/;  # volumen compartido con certbot
    }

    # =========================================================================
    #  Bloqueo de todo lo demás
    # =========================================================================
    # Cualquier petición que no sea el ACME challenge y llegue a este
    # bloque default se cierra sin respuesta.
    #
    # 444 es un código especial de NGINX (no estándar HTTP) que cierra
    # la conexión inmediatamente sin enviar ninguna respuesta al cliente.
    # Más agresivo que un 404 — el cliente no sabe ni si hay un servidor.
    # Protege contra bots y escaneos de IPs.
    location / {
        return 444;
    }
}